<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void's PokeVault</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #050505;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 2em;
  font-weight: bold;
  background: linear-gradient(90deg, #00ffcc, #6a00ff);
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 10px;
}

nav a {
  color: white;
  text-decoration: none;
}

.carousel {
  width: 100%;
  height: 300px;
  overflow: hidden;
}

.carousel img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

button {
  background: #00ffcc;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
}

.cart-box {
  position: fixed;
  right: 10px;
  bottom: 10px;
  background: #6a00ff;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>Void's PokeVault</header>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Latest Drops</a>
<a href="#">Contact</a>
</nav>

<div class="carousel">
<img id="carousel-img" src="https://images.pokemontcg.io/base1/4.png">
</div>

<div class="products" id="products"></div>

<div class="cart-box">
<button onclick="checkout()">Checkout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtn7AhpKlQYjMuJlfDrPP2qg9Xdg5xlgY",
  authDomain: "voidspokevault.firebaseapp.com",
  projectId: "voidspokevault",
  storageBucket: "voidspokevault.firebasestorage.app",
  messagingSenderId: "730635100781",
  appId: "1:730635100781:web:be570a4d3affb81b265564"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

// 🔥 Load products from Firestore
async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  const products = [];

  querySnapshot.forEach((doc) => {
    products.push(doc.data());
  });

  displayProducts(products);
}

function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" width="100%">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart(${i}, '${p.name}', ${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

window.addToCart = function(i, name, price) {
  cart.push({name, price});
  alert(name + " added to cart");
}

// 🛒 Checkout
window.checkout = async function() {
  let type = prompt("Type DELIVERY or SELF");

  let address = "";
  if (type === "DELIVERY") {
    address = prompt("Enter your address:");
  }

  await addDoc(collection(db, "orders"), {
    cart: cart,
    deliveryType: type,
    address: address,
    date: new Date()
  });

  alert("Order placed! We will contact you.");
  cart = [];
}

// 🔥 Carousel
let images = [
  "https://images.pokemontcg.io/base1/4.png",
  "https://images.pokemontcg.io/base1/2.png",
  "https://images.pokemontcg.io/base1/1.png"
];

let i = 0;
setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("carousel-img").src = images[i];
}, 2500);

loadProducts();

</script>

</body>
</html>
